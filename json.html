<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF Line-by-Line JSON Extractor</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Segoe UI,Arial,sans-serif;
    background:linear-gradient(135deg,#0f172a,#111827);
    color:white;
    min-height:100vh;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:30px;
}

.card{
    background:#1e293b;
    border:1px solid #334155;
    border-radius:16px;
    padding:25px;
    box-shadow:0 0 25px rgba(0,0,0,0.35);
}

h2{
    margin-top:0;
    color:#38bdf8;
}

input[type=file]{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #475569;
    background:#0f172a;
    color:white;
}

.buttons{
    display:flex;
    gap:12px;
    margin:15px 0;
    flex-wrap:wrap;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

.extractBtn{
    background:#0ea5e9;
    color:white;
}

.extractBtn:hover{
    background:#0284c7;
}

.downloadBtn{
    background:#22c55e;
    color:white;
}

.downloadBtn:hover{
    background:#16a34a;
}

button:disabled{
    opacity:0.5;
    cursor:not-allowed;
}

.status{
    margin:10px 0;
    padding:10px;
    border-radius:8px;
    background:#0f172a;
    border:1px solid #334155;
    color:#94a3b8;
}

textarea{
    width:100%;
    height:600px;
    background:#020617;
    color:#00ff88;
    border:1px solid #334155;
    border-radius:12px;
    padding:15px;
    font-family:Consolas,monospace;
    resize:vertical;
}
</style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>PDF → JSON (Line By Line)</h2>

        <input type="file" id="pdfFile" accept=".pdf">

        <div class="buttons">
            <button class="extractBtn" onclick="extractPDF()">Extract</button>
            <button class="downloadBtn" id="downloadBtn" onclick="downloadJSON()" disabled>
                Download JSON
            </button>
        </div>

        <div class="status" id="status">Waiting for PDF...</div>

        <textarea id="output"></textarea>
    </div>
</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let extractedData = [];
let currentPdfName = "pdf_lines";

function setStatus(msg){
    document.getElementById("status").innerText = msg;
}

async function extractPDF(){

    const file = document.getElementById("pdfFile").files[0];

    if(!file){
        alert("Please select a PDF.");
        return;
    }

    currentPdfName = file.name.replace(/\.pdf$/i, "");
    extractedData = [];
    document.getElementById("downloadBtn").disabled = true;

    setStatus("Extracting PDF... Please wait");

    const buffer = await file.arrayBuffer();

    const pdf = await pdfjsLib.getDocument({
        data: buffer
    }).promise;

    for(let pageNum = 1; pageNum <= pdf.numPages; pageNum++){

        setStatus(`Processing page ${pageNum} of ${pdf.numPages}`);

        const page = await pdf.getPage(pageNum);
        const textContent = await page.getTextContent();
        const rows = {};

        textContent.items.forEach(item => {

            const x = item.transform[4];
            const y = Math.round(item.transform[5]);

            if(!rows[y]){
                rows[y] = [];
            }

            rows[y].push({
                x: x,
                text: item.str
            });

        });

        const sortedRows = Object.keys(rows)
            .map(Number)
            .sort((a,b)=>b-a);

        let lineNumber = 1;

        sortedRows.forEach(y => {

            const lineText = rows[y]
                .sort((a,b)=>a.x-b.x)
                .map(obj=>obj.text)
                .join(" ")
                .replace(/\s+/g," ")
                .trim();

            if(lineText){
                extractedData.push({
                    page: pageNum,
                    line: lineNumber++,
                    text: lineText
                });
            }

        });

    }

    document.getElementById("output").value =
        JSON.stringify(extractedData,null,2);

    document.getElementById("downloadBtn").disabled = false;
    setStatus(`Done! Extracted ${extractedData.length} lines`);
}

function downloadJSON(){

    if(extractedData.length === 0){
        alert("No data extracted.");
        return;
    }

    const blob = new Blob(
        [JSON.stringify(extractedData,null,2)],
        {type:"application/json"}
    );

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;

    // Use PDF filename
    a.download = currentPdfName + ".json";

    a.click();
    URL.revokeObjectURL(url);
}

</script>

</body>
</html>
